name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write       # ← Add this; required for some internal action operations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← Silences the Node.js 20 warning

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # ← Add explicit checkout step

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Siddhesh-Achrekar
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true         # ← Cleanly recreates the branch each run